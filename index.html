<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayı Avı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#101826;
    --panel:#182234;
    --panel-2:#1f2c42;
    --line:#2c3a52;
    --text:#EDEFE9;
    --muted:#8B96A8;
    --amber:#FBBF24;
    --amber-dim:#7A5D14;
    --teal:#2DD4BF;
    --teal-dim:#155249;
    --coral:#FF6B4A;
    --coral-dim:#7A2E1B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .wrap{width:100%;max-width:620px;}
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--amber);
    margin:0 0 6px;
  }
  h1{
    font-size:clamp(32px,6vw,46px);
    font-weight:700;
    margin:0 0 8px;
    line-height:1.05;
  }
  .sub{
    color:var(--muted);
    font-size:15px;
    margin:0 0 32px;
    max-width:46ch;
  }
  .board{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px;
  }
  .rangebar{
    position:relative;
    height:10px;
    background:var(--panel-2);
    border-radius:6px;
    margin:6px 0 10px;
    overflow:hidden;
  }
  .rangebar-fill{
    position:absolute;
    top:0;bottom:0;
    left:0%;
    width:100%;
    background:linear-repeating(var(--amber));
    background:var(--amber);
    opacity:.55;
    border-radius:6px;
    transition:left .35s ease, width .35s ease;
  }
  .rangebar-marker{
    position:absolute;
    top:-6px;
    width:2px;height:22px;
    background:var(--text);
    transition:left .35s ease;
  }
  .bounds{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
    margin-bottom:26px;
  }
  .bounds b{color:var(--text);font-weight:500;}
  .input-row{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  input[type=number]{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size:22px;
    font-weight:500;
    padding:14px 16px;
    border-radius:10px;
    outline:none;
    width:100%;
    -moz-appearance:textfield;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]:focus{border-color:var(--amber);}
  button{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:16px;
    background:var(--amber);
    color:#241B04;
    border:none;
    padding:0 26px;
    border-radius:10px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  button:hover{background:#FCCB4C;}
  button:active{transform:scale(.97);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .feedback{
    min-height:56px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:17px;
    font-weight:500;
    padding:0 2px;
  }
  .feedback .arrow{
    font-family:'JetBrains Mono', monospace;
    font-size:20px;
    font-weight:700;
  }
  .feedback.up{color:var(--coral);}
  .feedback.down{color:var(--teal);}
  .feedback.win{color:var(--amber);font-size:18px;}
  .stat{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
  }
  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }
  .history{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:14px;
  }
  .chip{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    padding:4px 8px;
    border-radius:6px;
    border:1px solid var(--line);
    color:var(--muted);
  }
  .chip.up{color:var(--coral);border-color:var(--coral-dim);}
  .chip.down{color:var(--teal);border-color:var(--teal-dim);}
  .chip.hit{color:var(--amber);border-color:var(--amber-dim);}
  .restart-msg{display:none;}
  .restart-msg.show{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Aralık: 1 – 100</p>
  <h1>Sayı Avı</h1>
  <p class="sub">Aklımdan bir sayı tuttum. Tahmin et, sana "daha büyük" ya da "daha küçük" diyerek yön göstereyim. Amaç: en az denemeyle bulmak.</p>

  <div class="board">
    <div class="rangebar">
      <div class="rangebar-fill" id="rangeFill"></div>
      <div class="rangebar-marker" id="rangeMarker" style="left:-10px;"></div>
    </div>
    <div class="bounds">
      <span>Alt sınır: <b id="lowVal">1</b></span>
      <span>Üst sınır: <b id="highVal">100</b></span>
    </div>

    <div class="input-row">
      <input type="number" id="guessInput" min="1" max="100" placeholder="1-100 arası bir sayı" autofocus>
      <button id="guessBtn">Tahmin et</button>
    </div>

    <div class="feedback" id="feedback">
      <span class="stat">İlk tahminini yap.</span>
    </div>

    <div class="footer-row">
      <span class="stat" id="tryCount">Deneme: 0</span>
      <button id="restartBtn" style="background:transparent;border:1px solid var(--line);color:var(--muted);">Yeniden başlat</button>
    </div>

    <div class="history" id="history"></div>
  </div>
</div>

<script>
  let hedefSayi, denemeSayisi, low, high, guessHistory, gameOver;

  const input = document.getElementById('guessInput');
  const btn = document.getElementById('guessBtn');
  const feedback = document.getElementById('feedback');
  const tryCount = document.getElementById('tryCount');
  const history = document.getElementById('history');
  const restartBtn = document.getElementById('restartBtn');
  const rangeFill = document.getElementById('rangeFill');
  const rangeMarker = document.getElementById('rangeMarker');
  const lowVal = document.getElementById('lowVal');
  const highVal = document.getElementById('highVal');

  function baslat(){
    hedefSayi = Math.floor(Math.random() * 100) + 1;
    denemeSayisi = 0;
    low = 1;
    high = 100;
    guessHistory = [];
    gameOver = false;
    input.value = '';
    input.disabled = false;
    btn.disabled = false;
    input.focus();
    tryCount.textContent = 'Deneme: 0';
    feedback.className = 'feedback';
    feedback.innerHTML = '<span class="stat">İlk tahminini yap.</span>';
    history.innerHTML = '';
    updateRange();
  }

  function updateRange(){
    lowVal.textContent = low;
    highVal.textContent = high;
    const leftPct = ((low - 1) / 99) * 100;
    const widthPct = ((high - low) / 99) * 100;
    rangeFill.style.left = leftPct + '%';
    rangeFill.style.width = Math.max(widthPct, 1) + '%';
  }

  function markerAt(tahmin){
    const pct = ((tahmin - 1) / 99) * 100;
    rangeMarker.style.left = 'calc(' + pct + '% - 1px)';
  }

  function tahminYap(){
    if(gameOver) return;
    const tahmin = parseInt(input.value, 10);
    if(isNaN(tahmin) || tahmin < 1 || tahmin > 100){
      feedback.className = 'feedback up';
      feedback.innerHTML = '<span class="arrow">!</span><span>1 ile 100 arasında bir sayı gir.</span>';
      return;
    }

    denemeSayisi += 1;
    tryCount.textContent = 'Deneme: ' + denemeSayisi;
    markerAt(tahmin);

    if(tahmin === hedefSayi){
      feedback.className = 'feedback win';
      feedback.innerHTML = 'Tebrikler! Doğru sayıyı ' + denemeSayisi + '. denemede buldun.';
      addChip(tahmin, 'hit');
      gameOver = true;
      input.disabled = true;
      btn.disabled = true;
    } else if(tahmin < hedefSayi){
      low = Math.max(low, tahmin + 1);
      feedback.className = 'feedback up';
      feedback.innerHTML = '<span class="arrow">↑</span><span>Daha büyük bir sayı girin.</span>';
      addChip(tahmin, 'up');
      updateRange();
    } else {
      high = Math.min(high, tahmin - 1);
      feedback.className = 'feedback down';
      feedback.innerHTML = '<span class="arrow">↓</span><span>Daha küçük bir sayı girin.</span>';
      addChip(tahmin, 'down');
      updateRange();
    }

    input.value = '';
    if(!gameOver) input.focus();
  }

  function addChip(val, type){
    const chip = document.createElement('span');
    chip.className = 'chip ' + type;
    chip.textContent = val;
    history.appendChild(chip);
  }

  btn.addEventListener('click', tahminYap);
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter') tahminYap(); });
  restartBtn.addEventListener('click', baslat);

  baslat();
</script>
</body>
</html>
